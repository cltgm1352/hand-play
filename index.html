<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONDUCTOR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@300;400&display=swap');

:root {
  --bg: #06040f;
  --gold: #c9a84c;
  --gold2: #f0d080;
  --rose: #e8607a;
  --sky: #7ec8e3;
  --violet: #9b72cf;
  --text: #e8dcc8;
  --dim: rgba(201,168,76,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── starfield bg ── */
#stars-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ── header ── */
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 28px;
  background: rgba(6,4,15,0.9);
  border-bottom: 1px solid rgba(201,168,76,0.2);
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem; letter-spacing: 6px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(201,168,76,0.5);
}
#instruments {
  display: flex; gap: 16px;
}
.inst-badge {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem; letter-spacing: 2px;
  padding: 4px 12px;
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  color: rgba(201,168,76,0.4);
  transition: all 0.4s;
  white-space: nowrap;
}
.inst-badge.active {
  border-color: var(--gold);
  color: var(--gold2);
  box-shadow: 0 0 12px rgba(201,168,76,0.3);
  background: rgba(201,168,76,0.07);
}
#hand-status {
  font-size: 0.7rem; color: rgba(201,168,76,0.35);
  font-family: 'Cinzel', serif; letter-spacing: 2px;
}
#hand-status.on { color: var(--gold); text-shadow: 0 0 8px var(--gold); }

/* ── main stage ── */
#stage {
  flex: 1; position: relative; overflow: hidden; z-index: 1;
}
#fx-canvas, #hand-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
}
#hand-canvas { z-index: 3; pointer-events: none; }
#fx-canvas   { z-index: 2; pointer-events: none; }
#video { display: none; }

/* ── parameter bars (bottom) ── */
#params {
  position: relative; z-index: 10;
  display: flex; gap: 0;
  background: rgba(6,4,15,0.92);
  border-top: 1px solid rgba(201,168,76,0.15);
}
.param-cell {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 4px 10px;
  border-right: 1px solid rgba(201,168,76,0.08);
  gap: 5px;
}
.param-cell:last-child { border-right: none; }
.param-name {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem; letter-spacing: 2px;
  color: rgba(201,168,76,0.4);
  text-transform: uppercase;
}
.param-bar-wrap {
  width: 80%; height: 4px;
  background: rgba(201,168,76,0.08);
  border-radius: 2px; overflow: hidden;
}
.param-bar {
  height: 100%; border-radius: 2px;
  transition: width 0.08s linear;
}
.param-val {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem; color: var(--gold);
}

/* ── start overlay ── */
#start-screen {
  position: absolute; inset: 0; z-index: 50;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 28px;
  background: rgba(6,4,15,0.97);
}
.baton-icon {
  font-size: 5rem;
  animation: sway 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(201,168,76,0.6));
}
@keyframes sway {
  0%,100%{ transform: rotate(-20deg); }
  50%{ transform: rotate(20deg); }
}
#start-screen h2 {
  font-family: 'Cinzel', serif;
  font-size: 2rem; letter-spacing: 8px;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(201,168,76,0.5);
}
.guide-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; max-width: 420px;
}
.guide-card {
  background: rgba(201,168,76,0.04);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex; flex-direction: column; gap: 4px;
}
.guide-card .icon { font-size: 1.4rem; }
.guide-card .title {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem; letter-spacing: 2px; color: var(--gold);
}
.guide-card .desc { font-size: 0.75rem; color: rgba(232,220,200,0.6); }
#start-btn {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem; letter-spacing: 4px;
  padding: 14px 48px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  border-radius: 2px; cursor: pointer;
  box-shadow: 0 0 24px rgba(201,168,76,0.15), inset 0 0 24px rgba(201,168,76,0.04);
  transition: all 0.25s;
}
#start-btn:hover {
  background: rgba(201,168,76,0.1);
  box-shadow: 0 0 48px rgba(201,168,76,0.35);
}
#start-btn:disabled { opacity: 0.35; cursor: default; }
</style>
</head>
<body>

<!-- Starfield -->
<canvas id="stars-canvas"></canvas>

<header>
  <h1>CONDUCTOR</h1>
  <div id="instruments">
    <div class="inst-badge" id="badge-strings">STRINGS</div>
    <div class="inst-badge" id="badge-winds">WINDS</div>
    <div class="inst-badge" id="badge-brass">BRASS</div>
    <div class="inst-badge" id="badge-perc">PERC</div>
  </div>
  <div id="hand-status">NO HANDS</div>
</header>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="fx-canvas"></canvas>
  <canvas id="hand-canvas"></canvas>

  <div id="start-screen">
    <div class="baton-icon">🎼</div>
    <h2>CONDUCTOR</h2>
    <div class="guide-grid">
      <div class="guide-card">
        <div class="icon">🖐</div>
        <div class="title">LEFT HAND</div>
        <div class="desc">上下で<strong>音量</strong>・左右で<strong>音色</strong>を変える</div>
      </div>
      <div class="guide-card">
        <div class="icon">🤚</div>
        <div class="title">RIGHT HAND</div>
        <div class="desc">振る速さで<strong>テンポ</strong>・高さで<strong>音域</strong></div>
      </div>
      <div class="guide-card">
        <div class="icon">✨</div>
        <div class="title">VISUAL</div>
        <div class="desc">手の軌跡が光の粒子に。両手で色が混ざる</div>
      </div>
      <div class="guide-card">
        <div class="icon">🤫</div>
        <div class="title">SILENCE</div>
        <div class="desc">両手を下ろすと音が静まる</div>
      </div>
    </div>
    <button id="start-btn">▶ BEGIN</button>
  </div>
</div>

<div id="params">
  <div class="param-cell">
    <div class="param-name">VOLUME</div>
    <div class="param-bar-wrap"><div class="param-bar" id="bar-vol" style="width:0%;background:linear-gradient(90deg,#c9a84c,#f0d080)"></div></div>
    <div class="param-val" id="val-vol">—</div>
  </div>
  <div class="param-cell">
    <div class="param-name">TEMPO</div>
    <div class="param-bar-wrap"><div class="param-bar" id="bar-tempo" style="width:0%;background:linear-gradient(90deg,#7ec8e3,#9b72cf)"></div></div>
    <div class="param-val" id="val-tempo">—</div>
  </div>
  <div class="param-cell">
    <div class="param-name">PITCH</div>
    <div class="param-bar-wrap"><div class="param-bar" id="bar-pitch" style="width:0%;background:linear-gradient(90deg,#e8607a,#c9a84c)"></div></div>
    <div class="param-val" id="val-pitch">—</div>
  </div>
  <div class="param-cell">
    <div class="param-name">TIMBRE</div>
    <div class="param-bar-wrap"><div class="param-bar" id="bar-timbre" style="width:0%;background:linear-gradient(90deg,#9b72cf,#7ec8e3)"></div></div>
    <div class="param-val" id="val-timbre">—</div>
  </div>
  <div class="param-cell">
    <div class="param-name">REVERB</div>
    <div class="param-bar-wrap"><div class="param-bar" id="bar-reverb" style="width:0%;background:linear-gradient(90deg,#7ec8e3,#e8dcc8)"></div></div>
    <div class="param-val" id="val-reverb">—</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════════════════════════════════
//  STARFIELD
// ═══════════════════════════════════════════════════
const starsCanvas = document.getElementById('stars-canvas');
const sCtx = starsCanvas.getContext('2d');
let stars = [];
function initStars() {
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
  stars = Array.from({length:120}, () => ({
    x: Math.random()*starsCanvas.width,
    y: Math.random()*starsCanvas.height,
    r: Math.random()*1.2,
    a: Math.random(),
    speed: 0.003+Math.random()*0.006,
    phase: Math.random()*Math.PI*2,
  }));
}
function drawStars(t) {
  sCtx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
  for (const s of stars) {
    const a = 0.2 + 0.3*Math.sin(t*s.speed+s.phase);
    sCtx.globalAlpha = a;
    sCtx.fillStyle = '#c9a84c';
    sCtx.beginPath(); sCtx.arc(s.x,s.y,s.r,0,Math.PI*2); sCtx.fill();
  }
  sCtx.globalAlpha = 1;
}
initStars();
window.addEventListener('resize', initStars);

// ═══════════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════════
let actx, masterGain, reverbNode, dryGain, wetGain;
const oscGroups = {
  strings: [],
  winds:   [],
  brass:   [],
  perc:    [],
};

const CHORD_FREQS = {
  strings: [130.81, 164.81, 196.00, 246.94, 293.66],  // C3 chord
  winds:   [261.63, 329.63, 392.00],
  brass:   [87.31, 110.00, 130.81],
  perc:    [200, 400, 600],
};

function makeReverb(ctx, secs=2.5, decay=2) {
  const len = ctx.sampleRate * secs;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c=0;c<2;c++) {
    const d = buf.getChannelData(c);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, decay);
  }
  const conv = ctx.createConvolver();
  conv.buffer = buf;
  return conv;
}

function initAudio() {
  actx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0;

  // reverb chain
  reverbNode = makeReverb(actx);
  dryGain = actx.createGain(); dryGain.gain.value = 0.7;
  wetGain = actx.createGain(); wetGain.gain.value = 0.3;

  masterGain.connect(dryGain); dryGain.connect(actx.destination);
  masterGain.connect(reverbNode); reverbNode.connect(wetGain); wetGain.connect(actx.destination);

  // create oscillator groups
  const waveTypes = { strings:'sawtooth', winds:'sine', brass:'square', perc:'triangle' };
  for (const [group, freqs] of Object.entries(CHORD_FREQS)) {
    for (const freq of freqs) {
      const osc = actx.createOscillator();
      const g   = actx.createGain();
      osc.type = waveTypes[group];
      osc.frequency.value = freq;
      g.gain.value = 0;
      osc.connect(g); g.connect(masterGain);
      osc.start();
      oscGroups[group].push({ osc, gain: g, baseFreq: freq });
    }
  }
}

// smooth param updates
function setGainSmooth(gainNode, val, t=0.08) {
  gainNode.gain.cancelScheduledValues(actx.currentTime);
  gainNode.gain.linearRampToValueAtTime(val, actx.currentTime + t);
}

// ═══════════════════════════════════════════════════
//  CONDUCTOR PARAMS  (0–1 normalized)
// ═══════════════════════════════════════════════════
const params = {
  volume:  0,   // left hand height (inverted: top=1)
  timbre:  0.5, // left hand x
  pitch:   0.5, // right hand height
  tempo:   0.5, // right hand velocity
  reverb:  0.3, // combo
};

let targetParams = { ...params };
const SMOOTHING = 0.07;

function smoothParams() {
  for (const k of Object.keys(params)) {
    params[k] += (targetParams[k] - params[k]) * SMOOTHING;
  }
}

function applyAudio() {
  if (!actx) return;

  // master volume
  masterGain.gain.cancelScheduledValues(actx.currentTime);
  masterGain.gain.linearRampToValueAtTime(params.volume * 0.35, actx.currentTime + 0.05);

  // reverb mix
  const rv = params.reverb;
  dryGain.gain.linearRampToValueAtTime(1-rv*0.6, actx.currentTime+0.1);
  wetGain.gain.linearRampToValueAtTime(rv*0.8,   actx.currentTime+0.1);

  // timbre: crossfade between groups
  // timbre 0=strings, 0.33=winds, 0.66=brass, 1=perc
  const t = params.timbre * 3;
  const groupWeights = {
    strings: Math.max(0, 1-Math.abs(t-0)),
    winds:   Math.max(0, 1-Math.abs(t-1)),
    brass:   Math.max(0, 1-Math.abs(t-2)),
    perc:    Math.max(0, 1-Math.abs(t-3)),
  };

  // pitch shift
  const pitchMul = 0.7 + params.pitch * 0.8;

  for (const [group, oscs] of Object.entries(oscGroups)) {
    const w = groupWeights[group] || 0;
    for (const item of oscs) {
      setGainSmooth(item.gain, w * 0.18, 0.06);
      item.osc.frequency.linearRampToValueAtTime(item.baseFreq * pitchMul, actx.currentTime+0.05);
    }
  }

  // update instrument badges
  document.getElementById('badge-strings').classList.toggle('active', groupWeights.strings > 0.3);
  document.getElementById('badge-winds').classList.toggle('active',   groupWeights.winds   > 0.3);
  document.getElementById('badge-brass').classList.toggle('active',   groupWeights.brass   > 0.3);
  document.getElementById('badge-perc').classList.toggle('active',    groupWeights.perc    > 0.3);
}

function updateParamUI() {
  const set = (id, barId, val, fmt) => {
    document.getElementById(barId).style.width = (val*100)+'%';
    document.getElementById(id).textContent = fmt(val);
  };
  set('val-vol',    'bar-vol',    params.volume,  v => Math.round(v*100)+'%');
  set('val-tempo',  'bar-tempo',  params.tempo,   v => Math.round(60+v*120)+' BPM');
  set('val-pitch',  'bar-pitch',  params.pitch,   v => ['C3','D3','E3','F3','G3','A3','B3','C4'][Math.round(v*7)]);
  set('val-timbre', 'bar-timbre', params.timbre,  v => ['STRINGS','WINDS','BRASS','PERC'][Math.min(3,Math.floor(v*4))]);
  set('val-reverb', 'bar-reverb', params.reverb,  v => Math.round(v*100)+'%');
}

// ═══════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════════════════
const particles = [];
const MAX_PARTICLES = 600;

function spawnParticle(x, y, color, vel, size=3) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  const angle = Math.random()*Math.PI*2;
  const speed = 0.5 + Math.random()*vel;
  particles.push({
    x, y,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed - 1.5,
    life: 1,
    decay: 0.012 + Math.random()*0.018,
    color,
    size: size * (0.5+Math.random()),
    gravity: 0.04,
  });
}

function updateParticles() {
  for (let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i,1);
  }
}

function drawParticles(ctx) {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life * 0.85;
    ctx.shadowBlur = 8; ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════
//  HAND SKELETON
// ═══════════════════════════════════════════════════
const BONES = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

function lmPt(lm, i, W, H) {
  return { x:(1-lm[i].x)*W, y:lm[i].y*H };
}

function drawHand(ctx, lm, W, H, color) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.shadowBlur = 8; ctx.shadowColor = color;
  for (const [a,b] of BONES) {
    const pa=lmPt(lm,a,W,H), pb=lmPt(lm,b,W,H);
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
  }
  for (let i=0;i<21;i++) {
    const p = lmPt(lm,i,W,H);
    ctx.beginPath(); ctx.arc(p.x,p.y,i===0?5:2.5,0,Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  GESTURE: open hand detection (3+ fingers up)
//  ジェスチャーに関係なく常に手を追跡、ただし
//  手のひらが開いているときだけ音量ON
// ═══════════════════════════════════════════════════
function countExtended(lm) {
  let n = 0;
  if (lm[8].y  < lm[6].y)  n++;
  if (lm[12].y < lm[10].y) n++;
  if (lm[16].y < lm[14].y) n++;
  if (lm[20].y < lm[18].y) n++;
  return n;
}
function isOpen(lm) { return countExtended(lm) >= 3; }

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const handState = {
  left:  { lm:null, prev:null, vel:0, open:false },
  right: { lm:null, prev:null, vel:0, open:false },
};

function palmCenter(lm, W, H) {
  const idxs = [0,5,9,13,17];
  const pts = idxs.map(i=>lmPt(lm,i,W,H));
  return { x:pts.reduce((s,p)=>s+p.x,0)/pts.length, y:pts.reduce((s,p)=>s+p.y,0)/pts.length };
}

const video = document.getElementById('video');
const fxCanvas   = document.getElementById('fx-canvas');
const handCanvas = document.getElementById('hand-canvas');
const fxCtx   = fxCanvas.getContext('2d');
const handCtx = handCanvas.getContext('2d');

let started = false;
let mediapipeHands = [];

function resize() {
  const stage = document.getElementById('stage');
  fxCanvas.width   = handCanvas.width   = stage.clientWidth;
  fxCanvas.height  = handCanvas.height  = stage.clientHeight;
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════
//  VELOCITY TRACKER
// ═══════════════════════════════════════════════════
const velHistory = { left:[], right:[] };
function trackVelocity(side, cur, prev, W, H) {
  if (!prev) return 0;
  const cp = palmCenter(cur,W,H), pp = palmCenter(prev,W,H);
  const dx=cp.x-pp.x, dy=cp.y-pp.y;
  const v = Math.sqrt(dx*dx+dy*dy);
  const hist = velHistory[side];
  hist.push(v); if(hist.length>8) hist.shift();
  return hist.reduce((s,x)=>s+x,0)/hist.length;
}

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
let frameCount = 0;
function loop(t) {
  if (!started) { requestAnimationFrame(loop); return; }
  frameCount++;
  drawStars(t);

  const W = fxCanvas.width, H = fxCanvas.height;

  // ── hand canvas: camera + skeletons ──
  handCtx.save();
  handCtx.scale(-1,1); handCtx.translate(-W,0);
  handCtx.drawImage(video,0,0,W,H);
  handCtx.restore();
  // dark overlay
  handCtx.fillStyle = 'rgba(6,4,15,0.52)';
  handCtx.fillRect(0,0,W,H);

  // ── process hands ──
  let anyOpen = false;
  let leftPalm=null, rightPalm=null;

  for (const {lm, label} of mediapipeHands) {
    const side = label === 'Left' ? 'right' : 'left'; // mirrored
    const hs = handState[side];
    const vel = trackVelocity(side, lm, hs.lm, W, H);
    hs.vel = vel;
    hs.prev = hs.lm;
    hs.lm   = lm;
    hs.open = isOpen(lm);

    const palm = palmCenter(lm,W,H);
    if (side==='left')  leftPalm  = palm;
    if (side==='right') rightPalm = palm;

    // skeleton color
    const col = side==='left' ? '#c9a84c' : '#7ec8e3';
    drawHand(handCtx, lm, W, H, col);

    // particles from wrist when open
    if (hs.open && frameCount%2===0) {
      const intensity = Math.min(1, vel/8);
      const count = 2 + Math.round(intensity*6);
      for (let i=0;i<count;i++) spawnParticle(palm.x, palm.y, col, 2+intensity*4, 2+intensity*2);
    }

    if (hs.open) anyOpen = true;
  }

  // ── update conductor params ──
  if (leftPalm && handState.left.open) {
    // left hand: Y=volume (top=loud), X=timbre
    targetParams.volume  = Math.max(0, Math.min(1, 1 - leftPalm.y/H));
    targetParams.timbre  = Math.max(0, Math.min(1, leftPalm.x/W));
    targetParams.reverb  = Math.max(0, Math.min(1, leftPalm.x/W * 0.7));
  } else if (!leftPalm || !handState.left.open) {
    targetParams.volume  *= 0.93; // fade out
  }

  if (rightPalm && handState.right.open) {
    // right hand: Y=pitch, velocity=tempo
    targetParams.pitch = Math.max(0, Math.min(1, 1 - rightPalm.y/H));
    const velNorm = Math.min(1, handState.right.vel / 12);
    targetParams.tempo = 0.3 + velNorm * 0.7;
  }

  // smooth & apply
  smoothParams();
  applyAudio();
  updateParamUI();

  // hand status
  const statusEl = document.getElementById('hand-status');
  const hCount = mediapipeHands.length;
  statusEl.textContent = hCount===0 ? 'NO HANDS' : hCount===1 ? '1 HAND' : '2 HANDS';
  statusEl.classList.toggle('on', hCount>0);

  // ── fx canvas: particles + wave visualizer ──
  fxCtx.clearRect(0,0,W,H);

  // orchestral wave lines
  if (anyOpen || params.volume > 0.05) {
    const vol = params.volume;
    const lines = 5;
    for (let li=0;li<lines;li++) {
      const y0 = H*(0.2 + li*0.14);
      const amp = vol * (20+li*8) * params.pitch;
      const freq = 0.015 + li*0.004 + params.tempo*0.01;
      const phase = t*0.001*(1+li*0.2);
      const alpha = vol * (0.15 - li*0.02);
      fxCtx.save();
      fxCtx.strokeStyle = `rgba(201,168,76,${alpha})`;
      fxCtx.lineWidth = 1;
      fxCtx.shadowBlur = 4; fxCtx.shadowColor = '#c9a84c';
      fxCtx.beginPath();
      for (let x=0;x<W;x+=3) {
        const y = y0 + amp * Math.sin(x*freq + phase);
        x===0 ? fxCtx.moveTo(x,y) : fxCtx.lineTo(x,y);
      }
      fxCtx.stroke();
      fxCtx.restore();
    }
  }

  // central glow sphere when active
  if (params.volume > 0.05) {
    const cx=W/2, cy=H/2;
    const r = 30 + params.volume*80 + params.tempo*20;
    const g = fxCtx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0, `rgba(201,168,76,${params.volume*0.25})`);
    g.addColorStop(0.5,`rgba(126,200,227,${params.volume*0.12})`);
    g.addColorStop(1,'transparent');
    fxCtx.beginPath(); fxCtx.arc(cx,cy,r,0,Math.PI*2);
    fxCtx.fillStyle=g; fxCtx.fill();
  }

  updateParticles();
  drawParticles(fxCtx);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════
//  MEDIAPIPE
// ═══════════════════════════════════════════════════
function initMediaPipe() {
  const hands = new Hands({ locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.72,
    minTrackingConfidence: 0.6,
  });
  hands.onResults(results => {
    mediapipeHands = [];
    if (results.multiHandLandmarks) {
      results.multiHandLandmarks.forEach((lm,i) => {
        mediapipeHands.push({ lm, label: results.multiHandedness[i].label });
      });
    }
  });
  const cam = new Camera(video, {
    onFrame: async()=>{ await hands.send({image:video}); },
    width:640, height:480,
  });
  cam.start();
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', async ()=>{
  const btn = document.getElementById('start-btn');
  btn.textContent='▷ 起動中...'; btn.disabled=true;
  try {
    await navigator.mediaDevices.getUserMedia({video:true});
    initAudio();
    initMediaPipe();
    started = true;
    document.getElementById('start-screen').style.display='none';
  } catch(e) {
    btn.textContent='✕ カメラ許可が必要です'; btn.disabled=false;
  }
});
</script>
