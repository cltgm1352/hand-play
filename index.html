<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR DRUM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Kosugi+Maru&display=swap');

:root {
  --bg: #0c0c0e;
  --panel: #13131a;
  --bd:   #ff3d3d;   /* bass drum */
  --sd:   #ff9f1c;   /* snare */
  --hh:   #2ec4b6;   /* hi-hat */
  --oh:   #cbf3f0;   /* open hi-hat */
  --t1:   #a855f7;   /* tom1 */
  --t2:   #ec4899;   /* tom2 */
  --cy:   #facc15;   /* cymbal */
  --rim:  #4ade80;   /* rim */
  --text: #e2e8f0;
  --muted:#475569;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'Kosugi Maru',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* grid bg */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* ── header ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px;
  background:rgba(12,12,14,0.95);
  border-bottom:1px solid #1e1e2a;
  z-index:10; position:relative;
}
header h1 {
  font-family:'Orbitron',monospace;
  font-size:1.1rem; font-weight:900;
  letter-spacing:5px;
  background:linear-gradient(90deg,#ff3d3d,#ff9f1c,#2ec4b6);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
#bpm-wrap {
  display:flex; align-items:center; gap:10px;
  font-family:'Orbitron',monospace; font-size:0.75rem; color:var(--muted);
}
#bpm-wrap input[type=range] {
  -webkit-appearance:none; width:80px; height:3px;
  background:#2a2a3a; border-radius:2px; outline:none;
}
#bpm-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:12px; height:12px;
  background:#ff9f1c; border-radius:50%; cursor:pointer;
}
#bpm-val { color:#ff9f1c; min-width:36px; }
#status-dot {
  width:8px; height:8px; border-radius:50%;
  background:#333; transition:background 0.3s, box-shadow 0.3s;
}
#status-dot.on { background:#4ade80; box-shadow:0 0 10px #4ade80; }

/* ── main ── */
#main {
  flex:1; position:relative; overflow:hidden;
}
canvas { position:absolute; inset:0; width:100%; height:100%; }
#video { display:none; }

/* ── start screen ── */
#start-screen {
  position:absolute; inset:0; z-index:30;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:22px;
  background:rgba(12,12,14,0.97);
}
#start-screen h2 {
  font-family:'Orbitron',monospace; font-size:1.8rem; font-weight:900;
  letter-spacing:6px;
  background:linear-gradient(135deg,#ff3d3d,#ff9f1c,#2ec4b6);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.inst-list {
  display:flex; flex-direction:column; gap:8px;
  background:#13131a; border:1px solid #1e1e2a;
  border-radius:12px; padding:16px 24px;
  max-width:340px;
}
.inst-row {
  display:flex; align-items:center; gap:10px;
  font-size:0.88rem; color:#94a3b8;
}
.inst-icon { font-size:1.3rem; flex-shrink:0; }
#start-btn {
  font-family:'Orbitron',monospace; font-size:0.85rem;
  letter-spacing:3px; padding:13px 44px;
  background:transparent;
  border:1px solid #ff3d3d; color:#ff3d3d;
  border-radius:3px; cursor:pointer;
  box-shadow:0 0 20px rgba(255,61,61,0.2);
  transition:all 0.2s;
}
#start-btn:hover {
  background:rgba(255,61,61,0.12);
  box-shadow:0 0 40px rgba(255,61,61,0.4);
}
#start-btn:disabled { opacity:0.4; cursor:default; }
</style>
</head>
<body>

<header>
  <h1>AIR DRUM</h1>
  <div id="bpm-wrap">
    BPM <input type="range" id="bpm-slider" min="60" max="200" value="120">
    <span id="bpm-val">120</span>
    <div id="status-dot"></div>
  </div>
</header>

<div id="main">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="bg-canvas"></canvas>   <!-- camera + skeleton -->
  <canvas id="pad-canvas"></canvas>  <!-- pads + hit FX -->

  <div id="start-screen">
    <div style="font-size:3.5rem">🥁</div>
    <h2>AIR DRUM</h2>
    <div class="inst-list">
      <div class="inst-row"><div class="inst-icon">☝️</div><span><strong>人差し指1本だけ</strong>が反応します</span></div>
      <div class="inst-row"><div class="inst-icon">🙌</div><span>両手同時に叩けます</span></div>
      <div class="inst-row"><div class="inst-icon">🎯</div><span>指先がパッドに<strong>触れた瞬間</strong>に発音</span></div>
      <div class="inst-row"><div class="inst-icon">🤚</div><span>グー・パーなど他の形は<strong>完全無視</strong></span></div>
    </div>
    <button id="start-btn">📷 カメラ起動</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════════════════════════
//  GESTURE: index-only detection
//  人差し指だけが伸びていて、他の指が折れている
// ═══════════════════════════════════════════
function isIndexOnly(lm) {
  // 人差し指が伸びている
  const indexUp = lm[8].y < lm[6].y - 0.03;
  // 中・薬・小指が折れている（それぞれtipがPIPより下）
  const midDown  = lm[12].y > lm[10].y;
  const ringDown = lm[16].y > lm[14].y;
  const pinkDown = lm[20].y > lm[18].y;
  // 親指は緩め（どちらでもOK）
  return indexUp && midDown && ringDown && pinkDown;
}

// ═══════════════════════════════════════════
//  AUDIO ENGINE (Web Audio API)
// ═══════════════════════════════════════════
let actx;
function getAudioCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}

function playNoise(dur, freq, gain, type='bandpass', Q=1.5) {
  const ctx = getAudioCtx();
  const bufLen = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<bufLen;i++) d[i]=Math.random()*2-1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = type; filt.frequency.value = freq; filt.Q.value = Q;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
  src.connect(filt); filt.connect(g); g.connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + dur);
}

function playTone(freq, dur, gainVal, wave='sine', distort=false) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = wave; osc.frequency.setValueAtTime(freq, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq*0.3, ctx.currentTime + dur*0.8);
  const g = ctx.createGain();
  g.gain.setValueAtTime(gainVal, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
  let node = osc;
  if (distort) {
    const ws = ctx.createWaveShaper();
    const n=256, c=new Float32Array(n);
    for(let i=0;i<n;i++){const x=i*2/n-1; c[i]=x<0?-1:1;}
    ws.curve=c;
    osc.connect(ws); ws.connect(g);
  } else {
    osc.connect(g);
  }
  g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + dur);
}

const SOUNDS = {
  kick:   () => { playTone(60,0.5,1.2,'sine'); playNoise(0.05,120,0.3); },
  snare:  () => { playNoise(0.18,1800,0.9,'bandpass',0.8); playTone(180,0.12,0.4,'triangle'); },
  hihat:  () => playNoise(0.06,8000,0.5,'highpass',3),
  openhat:() => playNoise(0.28,7000,0.55,'highpass',2),
  tom1:   () => playTone(120,0.3,0.9,'sine'),
  tom2:   () => playTone(85,0.35,0.9,'sine'),
  cymbal: () => playNoise(0.6,6000,0.4,'bandpass',0.5),
  rim:    () => { playNoise(0.04,2000,0.7,'bandpass',5); playTone(400,0.04,0.3); },
};

// ═══════════════════════════════════════════
//  PAD LAYOUT
// ═══════════════════════════════════════════
// pads defined as fractions of canvas (will be computed in resize)
const PAD_DEFS = [
  { id:'cymbal',  label:'CYMBAL', color:'#facc15', col:0.5,  row:0.12 },
  { id:'openhat', label:'O.HAT',  color:'#cbf3f0', col:0.75, row:0.15 },
  { id:'hihat',   label:'HI-HAT', color:'#2ec4b6', col:0.25, row:0.15 },
  { id:'tom1',    label:'TOM 1',  color:'#a855f7', col:0.2,  row:0.38 },
  { id:'snare',   label:'SNARE',  color:'#ff9f1c', col:0.5,  row:0.42 },
  { id:'tom2',    label:'TOM 2',  color:'#ec4899', col:0.8,  row:0.38 },
  { id:'kick',    label:'KICK',   color:'#ff3d3d', col:0.5,  row:0.72 },
  { id:'rim',     label:'RIM',    color:'#4ade80', col:0.22, row:0.65 },
];

// pad radius fractions
const PAD_R_FRAC = { kick:0.105, cymbal:0.075, openhat:0.065, hihat:0.065, default:0.072 };

let pads = []; // computed each resize

function computePads(W, H) {
  pads = PAD_DEFS.map(p => {
    const rFrac = PAD_R_FRAC[p.id] || PAD_R_FRAC.default;
    return { ...p, x: p.col*W, y: p.row*H, r: Math.min(W,H)*rFrac };
  });
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const state = {
  started: false,
  hands: [],           // [{lm, label}]
  // per-hand, per-pad: was inside last frame?
  inside: {},          // key: `${handLabel}-${padId}` → bool
  // hit flash: [{padId, t}]
  hits: [],
  // finger trail: [{x,y,t,color}]
  trails: [],
};

// confirm frames per hand
const confirmBuf = {}; // handLabel → frames-as-index-only count
const CONFIRM = 2;     // 2フレーム連続で☝️と判定

// ═══════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════
const bgCanvas  = document.getElementById('bg-canvas');
const padCanvas = document.getElementById('pad-canvas');
const bgCtx  = bgCanvas.getContext('2d');
const padCtx = padCanvas.getContext('2d');
const video  = document.getElementById('video');

function resize() {
  const W = padCanvas.parentElement.clientWidth;
  const H = padCanvas.parentElement.clientHeight;
  bgCanvas.width = padCanvas.width  = W;
  bgCanvas.height= padCanvas.height = H;
  computePads(W, H);
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════
//  HAND → CANVAS COORDS (mirrored)
// ═══════════════════════════════════════════
function lmPt(lm, i) {
  return {
    x: (1 - lm[i].x) * padCanvas.width,
    y: lm[i].y * padCanvas.height,
  };
}

// ═══════════════════════════════════════════
//  HAND SKELETON DRAW
// ═══════════════════════════════════════════
const BONES = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];
const HAND_COLORS = { Left:'rgba(46,196,182,0.7)', Right:'rgba(255,61,61,0.7)' };

function drawSkeleton(lm, label, isActive) {
  const col = HAND_COLORS[label] || 'rgba(200,200,200,0.5)';
  const alpha = isActive ? 1 : 0.25;
  bgCtx.save();
  bgCtx.globalAlpha = alpha;
  bgCtx.strokeStyle = col;
  bgCtx.lineWidth = 1.5;
  bgCtx.shadowBlur = isActive ? 6 : 0;
  bgCtx.shadowColor = col;
  for (const [a,b] of BONES) {
    const pa = lmPt(lm,a), pb = lmPt(lm,b);
    bgCtx.beginPath(); bgCtx.moveTo(pa.x,pa.y); bgCtx.lineTo(pb.x,pb.y); bgCtx.stroke();
  }
  // joints — highlight index tip
  for (let i=0;i<21;i++) {
    const p = lmPt(lm,i);
    bgCtx.beginPath();
    const r = i===8 ? (isActive?9:5) : 2.5;
    bgCtx.arc(p.x,p.y,r,0,Math.PI*2);
    bgCtx.fillStyle = i===8 ? (isActive ? '#fff' : col) : col;
    bgCtx.fill();
  }
  bgCtx.restore();
}

// ═══════════════════════════════════════════
//  DRAW PADS
// ═══════════════════════════════════════════
function drawPads(now) {
  padCtx.clearRect(0,0,padCanvas.width,padCanvas.height);

  for (const pad of pads) {
    // check if recently hit
    const hitAge = (() => {
      const h = state.hits.find(h=>h.padId===pad.id);
      return h ? now - h.t : Infinity;
    })();
    const hitting = hitAge < 160;
    const hitAlpha = hitting ? Math.max(0, 1 - hitAge/160) : 0;

    const r = pad.r;

    padCtx.save();

    // glow on hit
    if (hitting) {
      padCtx.shadowBlur = 40 * hitAlpha;
      padCtx.shadowColor = pad.color;
    }

    // fill
    const grad = padCtx.createRadialGradient(pad.x, pad.y, r*0.1, pad.x, pad.y, r);
    grad.addColorStop(0, hexAlpha(pad.color, 0.22 + hitAlpha*0.4));
    grad.addColorStop(1, hexAlpha(pad.color, 0.04 + hitAlpha*0.15));
    padCtx.beginPath(); padCtx.arc(pad.x, pad.y, r, 0, Math.PI*2);
    padCtx.fillStyle = grad; padCtx.fill();

    // border
    padCtx.strokeStyle = hexAlpha(pad.color, 0.5 + hitAlpha*0.5);
    padCtx.lineWidth = hitting ? 2.5 : 1.2;
    padCtx.stroke();

    // label
    padCtx.fillStyle = hexAlpha(pad.color, 0.7 + hitAlpha*0.3);
    padCtx.font = `bold ${Math.round(r*0.28)}px 'Orbitron',monospace`;
    padCtx.textAlign = 'center'; padCtx.textBaseline = 'middle';
    padCtx.fillText(pad.label, pad.x, pad.y);

    // hit ripple
    if (hitting) {
      const rr = r + (r*0.6) * (hitAge/160);
      padCtx.beginPath(); padCtx.arc(pad.x, pad.y, rr, 0, Math.PI*2);
      padCtx.strokeStyle = hexAlpha(pad.color, hitAlpha * 0.5);
      padCtx.lineWidth = 1.5; padCtx.stroke();
    }

    padCtx.restore();
  }

  // draw finger trails
  for (const pt of state.trails) {
    const age = now - pt.t;
    if (age > 250) continue;
    padCtx.save();
    padCtx.globalAlpha = Math.max(0, 1 - age/250) * 0.7;
    padCtx.beginPath(); padCtx.arc(pt.x, pt.y, 5*(1-age/250), 0, Math.PI*2);
    padCtx.fillStyle = pt.color; padCtx.fill();
    padCtx.restore();
  }

  // prune
  const cutoff = now - 400;
  state.hits  = state.hits.filter(h=>h.t > cutoff - 200);
  state.trails= state.trails.filter(p=>p.t > cutoff);
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ═══════════════════════════════════════════
//  HIT DETECTION
// ═══════════════════════════════════════════
function checkHits(hands, now) {
  for (const {lm, label, active} of hands) {
    if (!active) {
      // not index-only → clear inside state for this hand
      for (const pad of pads) {
        const key = `${label}-${pad.id}`;
        state.inside[key] = false;
      }
      continue;
    }

    const tip = lmPt(lm, 8); // index fingertip
    const col = HAND_COLORS[label] || '#fff';

    // trail
    state.trails.push({ x:tip.x, y:tip.y, t:now, color:col });

    for (const pad of pads) {
      const key = `${label}-${pad.id}`;
      const dx = tip.x - pad.x, dy = tip.y - pad.y;
      const inside = Math.sqrt(dx*dx+dy*dy) < pad.r;

      // trigger on ENTER (was outside, now inside)
      if (inside && !state.inside[key]) {
        SOUNDS[pad.id]?.();
        state.hits = state.hits.filter(h=>h.padId!==pad.id);
        state.hits.push({ padId:pad.id, t:now });
      }
      state.inside[key] = inside;
    }
  }
}

// ═══════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════
function loop(now) {
  if (!state.started) { requestAnimationFrame(loop); return; }

  const W = bgCanvas.width, H = bgCanvas.height;

  // BG canvas: camera feed (mirrored) + skeletons
  bgCtx.save();
  bgCtx.scale(-1,1); bgCtx.translate(-W,0);
  bgCtx.drawImage(video, 0,0,W,H);
  bgCtx.restore();

  // dim overlay
  bgCtx.fillStyle='rgba(12,12,14,0.48)';
  bgCtx.fillRect(0,0,W,H);

  // skeletons
  for (const h of state.hands) drawSkeleton(h.lm, h.label, h.active);

  // check hits
  checkHits(state.hands, now);

  // pad layer
  drawPads(now);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ═══════════════════════════════════════════
//  MEDIAPIPE
// ═══════════════════════════════════════════
function initMediaPipe() {
  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.75,
    minTrackingConfidence: 0.6,
  });
  hands.onResults(results => {
    const detected = [];
    if (results.multiHandLandmarks) {
      results.multiHandLandmarks.forEach((lm, i) => {
        const label = results.multiHandedness[i].label; // 'Left' or 'Right'
        // confirm frames
        const key = label;
        const isIdx = isIndexOnly(lm);
        confirmBuf[key] = isIdx ? (confirmBuf[key]||0)+1 : 0;
        const active = confirmBuf[key] >= CONFIRM;
        detected.push({ lm, label, active });
      });
    }
    state.hands = detected;

    // status dot
    const anyActive = detected.some(h=>h.active);
    document.getElementById('status-dot').classList.toggle('on', detected.length>0);
  });

  const cam = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width:640, height:480,
  });
  cam.start();
}

// ═══════════════════════════════════════════
//  UI EVENTS
// ═══════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', async () => {
  const btn = document.getElementById('start-btn');
  btn.textContent = '⏳ 起動中...'; btn.disabled = true;
  try {
    await navigator.mediaDevices.getUserMedia({ video:true });
    initMediaPipe();
    state.started = true;
    document.getElementById('start-screen').style.display = 'none';
  } catch(e) {
    btn.textContent = '❌ カメラ許可が必要です'; btn.disabled = false;
  }
});

const bpmSlider = document.getElementById('bpm-slider');
const bpmVal    = document.getElementById('bpm-val');
bpmSlider.addEventListener('input', () => { bpmVal.textContent = bpmSlider.value; });
</script>
</body>
</html>
