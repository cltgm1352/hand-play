<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediaPipe × Three.js 擬似VTuber</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    #video { position:absolute; top:10px; left:10px; width:240px; opacity:0.6; }
    canvas { display:block; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/loaders/GLTFLoader.js';
    import { VRM, VRMUtils } from 'https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.9/lib/three-vrm.module.js';
    import { FaceLandmarker, FilesetResolver, DrawingUtils } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';
    // Kalidokit（blendshape変換用） - CDN版
    import { Face, Utils } from 'https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js';

    // ─────────────── シーン準備 ───────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.4, 2.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(1, 1, 1);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.6));

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.4, 0);

    // VRMモデル読み込み（VRoid Hubなどから好きなVRMをホスティングしてURLを入れる）
    let currentVrm;
    const loader = new GLTFLoader();
    loader.load(
      'https://cltgm1352.github.io/hand-play/CoolBanana.vrm',  // ← ここを変える！（例: https://.../sample.vrm）
      async (gltf) => {
        VRMUtils.removeUnnecessaryJoints(gltf.scene);
        currentVrm = await VRM.from(gltf);
        scene.add(currentVrm.scene);
        currentVrm.scene.position.set(0, 0, 0);
      }
    );

    // ─────────────── MediaPipe Face Landmarker ───────────────
    const filesetResolver = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    const faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
        delegate: "GPU"
      },
      outputFaceBlendshapes: true,
      outputFacialTransformationMatrixes: true,
      runningMode: "VIDEO",
      numFaces: 1
    });

    // カメラ起動
    const video = document.getElementById('video');
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        predictWebcam();
      };
    });

    // 描画ループ
    const drawingUtils = new DrawingUtils();
    let lastVideoTime = -1;

    async function predictWebcam() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const startTimeMs = performance.now();
        if (lastVideoTime !== video.currentTime) {
          lastVideoTime = video.currentTime;
          const results = await faceLandmarker.detectForVideo(video, startTimeMs);

          if (results.faceLandmarks?.length > 0 && currentVrm) {
            const face = results.faceLandmarks[0];
            const blendshapes = results.faceBlendshapes[0]?.categories || [];

            // KalidokitでVRM用に変換
            const solved = Face.solve(face, {
              runtime: "mediapipe",
              refineLandmarks: true,
              // 必要に応じて調整
            });

            // VRMに適用（Kalidokitの値はほぼそのままblendshapeにマップ可能）
            const { expressions } = solved;

            // 例: まばたき・口開き・笑顔など
            if (currentVrm.expressionManager) {
              currentVrm.expressionManager.setValue('blinkLeft', expressions.blink.l);
              currentVrm.expressionManager.setValue('blinkRight', expressions.blink.r);
              currentVrm.expressionManager.setValue('happy', expressions.mouthSmile.l + expressions.mouthSmile.r);
              currentVrm.expressionManager.setValue('angry', expressions.browDownLeft + expressions.browDownRight);
              // 他にもjoy, sorrow, angry などVRM標準blendshapeにマップ
            }

            // 頭の回転（neckボーン）
            if (currentVrm.humanoid?.getNormalizedBoneNode('head')) {
              const head = currentVrm.humanoid.getNormalizedBoneNode('head');
              head.rotation.setFromQuaternion(
                new THREE.Quaternion().setFromEuler(
                  new THREE.Euler(solved.head.degrees.y * THREE.MathUtils.DEG2RAD,
                                  solved.head.degrees.x * THREE.MathUtils.DEG2RAD,
                                  solved.head.degrees.z * THREE.MathUtils.DEG2RAD,
                                  'YXZ')
                )
              );
            }
          }

          // オプション：顔メッシュ描画（デバッグ用）
          // drawingUtils.drawLandmarks(canvasCtx, results.faceLandmarks, {color: '#00FF00'});
        }
      }
      requestAnimationFrame(predictWebcam);
    }

    // リサイズ対応
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      if (currentVrm) currentVrm.update(performance.now() / 1000);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
