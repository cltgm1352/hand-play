<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>擬似Vtuber - MediaPipe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Orbitron:wght@400;700&display=swap');

  :root {
    --pink: #ff6eb4;
    --cyan: #00e5ff;
    --purple: #b44fff;
    --dark: #0a0012;
    --darker: #050008;
    --glow-pink: 0 0 20px #ff6eb466, 0 0 60px #ff6eb422;
    --glow-cyan: 0 0 20px #00e5ff66, 0 0 60px #00e5ff22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: #fff;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, var(--darker) 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 30px;
    background: linear-gradient(180deg, rgba(5,0,8,0.95) 0%, transparent 100%);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 0.2em;
  }

  .status-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    display: inline-block;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active {
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* メインレイアウト */
  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 30px;
    align-items: flex-start;
    padding: 80px 30px 30px;
    width: 100%;
    max-width: 1100px;
    justify-content: center;
  }

  /* アバターパネル */
  .avatar-panel {
    position: relative;
    width: 440px;
    flex-shrink: 0;
  }

  .panel-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--cyan);
    opacity: 0.7;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .avatar-frame {
    position: relative;
    width: 440px;
    height: 500px;
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 4px;
    overflow: hidden;
    background: linear-gradient(180deg, #0d0020 0%, #050015 100%);
    box-shadow: var(--glow-cyan), inset 0 0 40px rgba(0,229,255,0.05);
  }

  /* コーナー装飾 */
  .avatar-frame::before, .avatar-frame::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--cyan);
    border-style: solid;
    z-index: 20;
  }
  .avatar-frame::before {
    top: 8px; left: 8px;
    border-width: 2px 0 0 2px;
  }
  .avatar-frame::after {
    bottom: 8px; right: 8px;
    border-width: 0 2px 2px 0;
  }

  /* SVGアバター */
  #avatarCanvas {
    width: 100%;
    height: 100%;
  }

  /* スキャンライン */
  .scanline {
    position: absolute;
    top: -2px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.6;
    animation: scan 3s linear infinite;
    z-index: 15;
    pointer-events: none;
  }

  @keyframes scan {
    0% { top: 0; opacity: 0; }
    5% { opacity: 0.6; }
    95% { opacity: 0.6; }
    100% { top: 100%; opacity: 0; }
  }

  /* 名前表示 */
  .name-tag {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 20px;
    background: linear-gradient(0deg, rgba(5,0,8,0.95) 0%, transparent 100%);
    z-index: 18;
  }

  .vtuber-name {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    text-shadow: var(--glow-pink);
    letter-spacing: 0.1em;
  }

  .vtuber-sub {
    font-size: 0.75rem;
    color: var(--pink);
    opacity: 0.8;
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  /* コントロールパネル */
  .control-panel {
    flex: 1;
    min-width: 260px;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-top: 24px;
  }

  .ctrl-box {
    border: 1px solid rgba(255,110,180,0.2);
    border-radius: 4px;
    padding: 16px;
    background: rgba(255,110,180,0.03);
  }

  .ctrl-box h3 {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--pink);
    opacity: 0.8;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.8rem;
  }

  .stat-label { color: #888; }
  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    color: var(--cyan);
  }

  .bar-track {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 2px;
    transition: width 0.1s ease;
    width: 0%;
  }

  /* カメラボタン */
  .cam-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(255,110,180,0.15), rgba(180,79,255,0.15));
    border: 1px solid rgba(255,110,180,0.4);
    border-radius: 4px;
    color: var(--pink);
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .cam-btn:hover {
    background: linear-gradient(135deg, rgba(255,110,180,0.3), rgba(180,79,255,0.3));
    box-shadow: var(--glow-pink);
  }

  .cam-btn.stop {
    color: #ff4466;
    border-color: rgba(255,68,102,0.5);
    background: rgba(255,68,102,0.1);
  }

  /* カメラ映像（非表示・処理用） */
  #webcam {
    position: fixed;
    top: -9999px; left: -9999px;
    width: 640px; height: 480px;
  }

  /* エフェクトリスト */
  .effect-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .effect-btn {
    padding: 5px 10px;
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 20px;
    background: transparent;
    color: #888;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  .effect-btn.active, .effect-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,229,255,0.08);
    box-shadow: 0 0 8px rgba(0,229,255,0.2);
  }

  /* ガイドテキスト */
  .guide {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    color: #444;
    letter-spacing: 0.1em;
    z-index: 100;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">VTUBER//STUDIO</div>
  <div class="status-bar">
    <span class="status-dot" id="camDot"></span>
    <span id="camLabel" style="color:#555">CAMERA OFFLINE</span>
    &nbsp;&nbsp;
    <span class="status-dot" id="trackDot"></span>
    <span id="trackLabel" style="color:#555">TRACKING OFF</span>
  </div>
</header>

<video id="webcam" autoplay playsinline></video>

<div class="stage">
  <!-- アバターパネル -->
  <div class="avatar-panel">
    <div class="panel-label">// AVATAR OUTPUT</div>
    <div class="avatar-frame">
      <div class="scanline"></div>
      <svg id="avatarCanvas" viewBox="0 0 440 500" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bgGrad" cx="50%" cy="60%" r="70%">
            <stop offset="0%" stop-color="#1a0035"/>
            <stop offset="100%" stop-color="#05000f"/>
          </radialGradient>
          <radialGradient id="faceGrad" cx="50%" cy="45%" r="55%">
            <stop offset="0%" stop-color="#ffe4ec"/>
            <stop offset="100%" stop-color="#ffb8c8"/>
          </radialGradient>
          <radialGradient id="hairGrad" cx="50%" cy="30%" r="60%">
            <stop offset="0%" stop-color="#9d4fff"/>
            <stop offset="100%" stop-color="#5500cc"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="faceClip">
            <ellipse cx="220" cy="240" rx="105" ry="125"/>
          </clipPath>
        </defs>

        <!-- 背景 -->
        <rect width="440" height="500" fill="url(#bgGrad)"/>

        <!-- 後ろ髪 -->

          <path id="twintailR" d="M335,230 Q380,320 360,420 Q350,460 330,440 Q345,380 325,280 Z" fill="#7700ff" opacity="0.85"/>
        </g>

        <!-- 首 -->
        <rect id="neck" x="195" y="345" width="50" height="55" rx="10" fill="#ffccd5"/>

          <!-- 頬の赤み -->

          <!-- 眉毛 -->

            <path id="eyebrowL" d="M158,195 Q178,188 198,192" stroke="#5500aa" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path id="eyebrowR" d="M242,192 Q262,188 282,195" stroke="#5500aa" stroke-width="4" fill="none" stroke-linecap="round"/>
          </g>

          <!-- 目 -->
          <g id="eyes">

            <g id="eyeL">

              <ellipse id="pupilL" cx="178" cy="225" rx="10" ry="11" fill="#220066"/>
              <!-- キャッチライト -->
              <ellipse cx="170" cy="218" rx="6" ry="5" fill="white" opacity="0.95"/>
              <ellipse cx="184" cy="230" rx="3" ry="2.5" fill="white" opacity="0.7"/>
              <!-- まつ毛 -->
              <path d="M152,212 Q160,205 178,203 Q196,205 204,212" fill="#330066" opacity="0.9"/>
              <!-- 下まつ毛 -->
              <line x1="156" y1="240" x2="153" y2="246" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="166" y1="244" x2="165" y2="250" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="178" y1="246" x2="178" y2="252" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="190" y1="244" x2="191" y2="250" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="200" y1="240" x2="203" y2="246" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>

            <!-- まばたき（左） -->
            <path id="blinkL" d="M152,212 Q178,205 204,212 Q178,240 152,212" fill="#ffccd5" opacity="0"/>

            <!-- 右目 -->
            <g id="eyeR">
              <ellipse id="eyeWhiteR" cx="262" cy="225" rx="26" ry="22" fill="white"/>
              <ellipse id="irisR" cx="262" cy="225" rx="18" ry="19" fill="#6622ee"/>
              <ellipse id="pupilR" cx="262" cy="225" rx="10" ry="11" fill="#220066"/>
              <ellipse cx="254" cy="218" rx="6" ry="5" fill="white" opacity="0.95"/>
              <ellipse cx="268" cy="230" rx="3" ry="2.5" fill="white" opacity="0.7"/>
              <path d="M236,212 Q244,205 262,203 Q280,205 288,212" fill="#330066" opacity="0.9"/>
              <line x1="240" y1="240" x2="237" y2="246" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="250" y1="244" x2="249" y2="250" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="262" y1="246" x2="262" y2="252" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="274" y1="244" x2="275" y2="250" stroke="#663399" stroke-width="1.5" stroke-linecap="round"/>

            <path id="blinkR" d="M236,212 Q262,205 288,212 Q262,240 236,212" fill="#ffccd5" opacity="0"/>
          </g>

          <!-- 鼻 -->
          <ellipse id="nose" cx="220" cy="268" rx="6" ry="3" fill="#ffaab8" opacity="0.5"/>

          <!-- 口 -->

            <path id="mouthPath" d="M198,295 Q210,303 220,304 Q230,303 242,295" stroke="#cc5577" stroke-width="2.5" fill="none" stroke-linecap="round"/>

            <ellipse id="mouthOpen" cx="220" cy="300" rx="18" ry="0" fill="#cc2244" opacity="0"/>

          <path d="M240,158 Q242,115 225,100 Q220,130 230,160" fill="#8822ff"/>

          <path id="ahoge" d="M215,88 Q210,50 220,35 Q230,50 225,88" fill="#9933ff" stroke="#aa44ff" stroke-width="1"/>

        <ellipse cx="325" cy="248" rx="9" ry="11" fill="#ffaab8"/>

          <path d="M138,135 L125,85 L158,118 Z" fill="#ffaab8"/>
          <path d="M305,140 L320,75 L275,120 Z" fill="#7711ff"/>
          <path d="M302,135 L315,85 L282,118 Z" fill="#ffaab8"/>
        </g>

        <!-- 光沢（顔） -->
        <ellipse cx="185" cy="195" rx="15" ry="8" fill="white" opacity="0.08" transform="rotate(-20,185,195)"/>

          <circle cx="360" cy="100" r="2" fill="#ff6eb4"/>
          <circle cx="50" cy="300" r="2" fill="#b44fff"/>
          <circle cx="390" cy="380" r="3" fill="#00e5ff"/>

      </svg>

      <!-- 名前タグ -->
      <div class="name-tag">
        <div class="vtuber-name">ARIA-chan</div>
        <div class="vtuber-sub">Virtual AI Idol // v1.0.0</div>
      </div>

  </div>

  <!-- コントロールパネル -->
  <div class="control-panel">
    <button class="cam-btn" id="camBtn" onclick="toggleCamera()">
      ▶ CAMERA START
    </button>

    <!-- トラッキング情報 -->
    <div class="ctrl-box">
      <h3>// FACE TRACKING</h3>
      <div class="stat-row">
        <span class="stat-label">顔検出</span>
        <span class="stat-value" id="faceDetect">---</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">頭部 X</span>
        <span class="stat-value" id="headX">0.00</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">頭部 Y</span>
        <span class="stat-value" id="headY">0.00</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">口の開き</span>
        <span class="stat-value" id="mouthStat">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="mouthBar"></div></div>
      <div class="stat-row" style="margin-top:10px">
        <span class="stat-label">まばたき L</span>
        <span class="stat-value" id="blinkLStat">open</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">まばたき R</span>
        <span class="stat-value" id="blinkRStat">open</span>
      </div>
    </div>

    <!-- エフェクト -->
    <div class="ctrl-box">
      <h3>// EFFECTS</h3>
      <div class="effect-list">
        <button class="effect-btn active" onclick="toggleEffect(this,'hearts')">💕 ハート</button>
        <button class="effect-btn" onclick="toggleEffect(this,'stars')">✨ スター</button>
        <button class="effect-btn" onclick="toggleEffect(this,'sparkle')">🌸 花</button>
        <button class="effect-btn" onclick="toggleEffect(this,'rainbow')">🌈 虹</button>
      </div>
    </div>

    <!-- キャラカスタム -->
    <div class="ctrl-box">
      <h3>// HAIR COLOR</h3>
      <div class="effect-list">
        <button class="effect-btn active" onclick="setHairColor(this,'purple')">紫</button>
        <button class="effect-btn" onclick="setHairColor(this,'blue')">青</button>
        <button class="effect-btn" onclick="setHairColor(this,'pink')">ピンク</button>
        <button class="effect-btn" onclick="setHairColor(this,'black')">黒</button>
      </div>
    </div>

    <!-- 感情ボタン -->
    <div class="ctrl-box">
      <h3>// EMOTION PRESET</h3>
      <div class="effect-list">
        <button class="effect-btn" onclick="setEmotion('happy')">😊 嬉しい</button>
        <button class="effect-btn" onclick="setEmotion('shy')">😳 恥ずかし</button>
        <button class="effect-btn" onclick="setEmotion('surprised')">😮 びっくり</button>
        <button class="effect-btn" onclick="setEmotion('default')">😐 通常</button>
      </div>
    </div>
  </div>
</div>

<div class="guide">カメラを起動して顔を認識させると、アバターが連動して動きます</div>

<!-- エフェクトキャンバス -->
<canvas id="fxCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:50;width:100%;height:100%"></canvas>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ===== アバター制御 =====
const svg = document.getElementById('avatarCanvas');
const faceGroup = document.getElementById('faceGroup');
const hairFront = document.getElementById('hairFront');
const hairBack = document.getElementById('hairBack');
const neck = document.getElementById('neck');
const body = document.getElementById('body');
const twintailL = document.getElementById('twintailL');
const twintailR = document.getElementById('twintailR');
const ahoge = document.getElementById('ahoge');
const catEars = document.getElementById('catEars');

// 顔パーツ
const blinkL = document.getElementById('blinkL');
const blinkR = document.getElementById('blinkR');
const mouthPath = document.getElementById('mouthPath');
const mouthOpen = document.getElementById('mouthOpen');
const teeth = document.getElementById('teeth');
const blushL = document.getElementById('blushL');
const blushR = document.getElementById('blushR');
const eyebrowL = document.getElementById('eyebrowL');
const eyebrowR = document.getElementById('eyebrowR');
const nose = document.getElementById('nose');

// エフェクト
const fxCanvas = document.getElementById('fxCanvas');
const fxCtx = fxCanvas.getContext('2d');
let effects = { hearts: true, stars: false, sparkle: false, rainbow: false };
let particles = [];

// 現在の状態
let currentX = 0, currentY = 0;
let targetX = 0, targetY = 0;
let isTracking = false;
let cameraActive = false;
let emotion = 'default';

// スムージング用
let smoothX = 0, smoothY = 0;
let smoothBlinkL = 0, smoothBlinkR = 0;
let smoothMouth = 0;

// --- 頭部回転 ---
function setHeadRotation(tx, ty) {
  // -1~1の範囲で入力（正規化済み）
  const maxRotX = 15; // 上下
  const maxRotY = 20; // 左右
  const maxTransX = 18;
  const maxTransY = 10;

  const rotY = ty * maxRotY;   // 上下 → X軸回転
  const rotX = tx * maxRotY;   // 左右 → Y軸回転（鏡面）

  const translateX = -tx * maxTransX;
  const translateY = ty * maxTransY;

  // SVGグループにtransform適用
  const cx = 220, cy = 250;
  const transform = `translate(${cx},${cy}) rotate(${rotX}) translate(${translateX},${translateY}) translate(${-cx},${-cy})`;
  
  faceGroup.setAttribute('transform', transform);
  hairFront.setAttribute('transform', transform);
  
  // 髪・耳は少し遅く動く
  const hairTransform = `translate(${cx},${cy}) rotate(${rotX * 0.7}) translate(${translateX * 0.5},${translateY * 0.5}) translate(${-cx},${-cy})`;
  hairBack.setAttribute('transform', hairTransform);
  neck.setAttribute('transform', `translate(${translateX * 0.3},${translateY * 0.3})`);
  catEars.setAttribute('transform', transform);

  // アホ毛がゆれる
  const ahogeAngle = tx * 8;
  ahoge.setAttribute('transform', `translate(220,88) rotate(${ahogeAngle}) translate(-220,-88)`);

  // ツインテールが揺れる
  const ttAngle = tx * 5;
  twintailL.setAttribute('transform', `rotate(${ttAngle},80,300)`);
  twintailR.setAttribute('transform', `rotate(${-ttAngle},360,300)`);
}

// --- まばたき ---
function setBlinkLeft(amount) {
  // amount: 0=open, 1=closed
  blinkL.style.opacity = amount;
  // 瞳孔の縮小
  const iris = document.getElementById('irisL');
  const scaleY = 1 - amount * 0.8;
  iris.setAttribute('ry', 19 * scaleY);
}
function setBlinkRight(amount) {
  blinkR.style.opacity = amount;
  const iris = document.getElementById('irisR');
  const scaleY = 1 - amount * 0.8;
  iris.setAttribute('ry', 19 * scaleY);
}

// --- 口の開き ---
function setMouthOpen(amount) {
  // amount: 0=closed, 1=fully open
  const openH = amount * 20;
  mouthOpen.setAttribute('ry', openH * 0.5);
  mouthOpen.style.opacity = amount > 0.1 ? 0.9 : 0;
  teeth.setAttribute('ry', Math.max(0, openH * 0.3));
  teeth.style.opacity = amount > 0.15 ? 0.9 : 0;

  // 口角の変化
  const spread = amount * 5;
  mouthPath.setAttribute('d', `M${198-spread},${295} Q210,${303+openH*0.5} 220,${304+openH*0.5} Q230,${303+openH*0.5} ${242+spread},${295}`);
  document.getElementById('mouthStat').textContent = Math.round(amount*100)+'%';
  document.getElementById('mouthBar').style.width = (amount*100)+'%';
}

// --- 表情プリセット ---
function setEmotion(e) {
  emotion = e;
  document.querySelectorAll('.effect-btn').forEach(b => {
    if(b.onclick && b.onclick.toString().includes('setEmotion')) b.classList.remove('active');
  });
  const emotionMap = { happy:'😊 嬉しい', shy:'😳 恥ずかし', surprised:'😮 びっくり', default:'😐 通常' };

  if(e === 'happy') {
    eyebrowL.setAttribute('d','M158,190 Q178,185 198,188');
    eyebrowR.setAttribute('d','M242,188 Q262,185 282,190');
    blushL.setAttribute('opacity','0.55');
    blushR.setAttribute('opacity','0.55');
  } else if(e === 'shy') {
    eyebrowL.setAttribute('d','M158,200 Q178,195 198,197');
    eyebrowR.setAttribute('d','M242,197 Q262,195 282,200');
    blushL.setAttribute('opacity','0.75');
    blushR.setAttribute('opacity','0.75');
  } else if(e === 'surprised') {
    eyebrowL.setAttribute('d','M158,188 Q178,180 198,185');
    eyebrowR.setAttribute('d','M242,185 Q262,180 282,188');
    blushL.setAttribute('opacity','0.2');
    blushR.setAttribute('opacity','0.2');
    // 目を大きく
    document.getElementById('irisL').setAttribute('ry', '21');
    document.getElementById('irisR').setAttribute('ry', '21');
  } else {
    eyebrowL.setAttribute('d','M158,195 Q178,188 198,192');
    eyebrowR.setAttribute('d','M242,192 Q262,188 282,195');
    blushL.setAttribute('opacity','0.35');
    blushR.setAttribute('opacity','0.35');
    document.getElementById('irisL').setAttribute('ry', '19');
    document.getElementById('irisR').setAttribute('ry', '19');
  }
}

// --- 髪色変更 ---
const hairColors = {
  purple: ['#7711ff','#6600ee','#7700ff','#8822ff','#9933ff'],
  blue:   ['#1177ff','#0055ee','#0066ff','#2288ff','#3399ff'],
  pink:   ['#ff44aa','#ee1188','#ff22aa','#ff66bb','#ff88cc'],
  black:  ['#221133','#110022','#221133','#332244','#443355'],
};

function setHairColor(btn, color) {
  document.querySelectorAll('.effect-btn').forEach(b => {
    if(b.onclick && b.onclick.toString().includes('setHairColor')) b.classList.remove('active');
  });
  btn.classList.add('active');

  const c = hairColors[color];
  const allPaths = [...hairBack.querySelectorAll('*'), ...hairFront.querySelectorAll('*'), ahoge, ...catEars.querySelectorAll('*')];
  // 簡易的に全要素のfill色を変更
  hairBack.querySelectorAll('ellipse, path').forEach((el,i) => {
    el.setAttribute('fill', c[i%c.length]);
  });
  hairFront.querySelectorAll('path').forEach((el,i) => {
    el.setAttribute('fill', c[i%c.length]);
  });
  ahoge.setAttribute('fill', c[4]);
  catEars.querySelectorAll('path:first-child').forEach(el => el.setAttribute('fill', c[0]));
}

// --- エフェクト切替 ---
function toggleEffect(btn, name) {
  effects[name] = !effects[name];
  btn.classList.toggle('active', effects[name]);
}

// ===== パーティクルエフェクト =====
function resizeFxCanvas() {
  fxCanvas.width = window.innerWidth;
  fxCanvas.height = window.innerHeight;
}
resizeFxCanvas();
window.addEventListener('resize', resizeFxCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * fxCanvas.width;
    this.y = fxCanvas.height + 20;
    this.size = 8 + Math.random() * 12;
    this.speed = 0.8 + Math.random() * 1.5;
    this.sway = (Math.random() - 0.5) * 1.5;
    this.opacity = 0.7 + Math.random() * 0.3;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.05;
    // タイプ決定
    const active = Object.entries(effects).filter(([k,v]) => v).map(([k]) => k);
    this.type = active[Math.floor(Math.random() * active.length)] || 'hearts';
    this.color = ['#ff6eb4','#ff88cc','#00e5ff','#b44fff','#ffaadd'][Math.floor(Math.random()*5)];
  }
  update() {
    this.y -= this.speed;
    this.x += this.sway;
    this.rotation += this.rotSpeed;
    if(this.y < -20) this.reset();
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = this.color;
    ctx.strokeStyle = this.color;

    const s = this.size;
    switch(this.type) {
      case 'hearts':
        ctx.beginPath();
        ctx.moveTo(0, -s*0.3);
        ctx.bezierCurveTo(s*0.5, -s*0.8, s, -s*0.2, 0, s*0.5);
        ctx.bezierCurveTo(-s, -s*0.2, -s*0.5, -s*0.8, 0, -s*0.3);
        ctx.fill();
        break;
      case 'stars':
        ctx.beginPath();
        for(let i=0;i<5;i++){
          const a = (i*Math.PI*2/5)-Math.PI/2;
          const b = a + Math.PI/5;
          if(i===0) ctx.moveTo(Math.cos(a)*s, Math.sin(a)*s);
          else ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
          ctx.lineTo(Math.cos(b)*s*0.4, Math.sin(b)*s*0.4);
        }
        ctx.closePath();
        ctx.fill();
        break;
      case 'sparkle':
        // 花びら
        for(let i=0;i<6;i++){
          const a = i*Math.PI/3;
          ctx.beginPath();
          ctx.ellipse(Math.cos(a)*s*0.5, Math.sin(a)*s*0.5, s*0.35, s*0.2, a, 0, Math.PI*2);
          ctx.fill();
        }
        break;
      case 'rainbow':
        const grad = ctx.createRadialGradient(0,0,0,0,0,s);
        const hue = (Date.now()/20 + this.x) % 360;
        grad.addColorStop(0, `hsla(${hue},100%,70%,1)`);
        grad.addColorStop(1, `hsla(${(hue+120)%360},100%,70%,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0,0,s,0,Math.PI*2);
        ctx.fill();
        break;
    }
    ctx.restore();
  }
}

// パーティクル初期化
for(let i=0;i<30;i++){
  const p = new Particle();
  p.y = Math.random() * fxCanvas.height;
  particles.push(p);
}

// --- アニメーションループ ---
let idleTime = 0;
let autoBlinkTimer = 0;
let autoBlinkL = 0, autoBlinkR = 0;

function animLoop() {
  requestAnimationFrame(animLoop);

  // キャンバスクリア
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

  // エフェクト描画
  const hasActive = Object.values(effects).some(v => v);
  if(hasActive) {
    particles.forEach(p => { p.update(); p.draw(fxCtx); });
  }

  // アイドル時のゆらぎ
  if(!isTracking) {
    idleTime += 0.015;
    const idleX = Math.sin(idleTime * 0.7) * 0.08;
    const idleY = Math.sin(idleTime * 0.4) * 0.05;
    setHeadRotation(idleX, idleY);

    // 自動まばたき
    autoBlinkTimer--;
    if(autoBlinkTimer <= 0) {
      autoBlinkTimer = 150 + Math.random() * 200;
      autoBlinkL = 1; autoBlinkR = 1;
    }
  }

  // スムーズな補間
  smoothX += (targetX - smoothX) * 0.12;
  smoothY += (targetY - smoothY) * 0.12;

  if(isTracking) {
    setHeadRotation(smoothX, smoothY);
  }

  // まばたき補間
  smoothBlinkL += (autoBlinkL - smoothBlinkL) * 0.25;
  smoothBlinkR += (autoBlinkR - smoothBlinkR) * 0.25;
  setBlinkLeft(smoothBlinkL);
  setBlinkRight(smoothBlinkR);

  // まばたきを素早く戻す
  if(autoBlinkL > 0.9) autoBlinkL = 0;
  if(autoBlinkR > 0.9) autoBlinkR = 0;

  // 口の補間
  // (smoothMouth は tracking から更新)
}
animLoop();

// ===== MediaPipe =====
let faceMesh, camera;

function initMediaPipe() {
  faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  faceMesh.onResults(onFaceResults);
}

function onFaceResults(results) {
  if(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    const lm = results.multiFaceLandmarks[0];
    isTracking = true;
    document.getElementById('faceDetect').textContent = 'DETECTED';
    document.getElementById('faceDetect').style.color = '#00ff88';
    document.getElementById('trackDot').classList.add('active');
    document.getElementById('trackLabel').textContent = 'TRACKING ON';
    document.getElementById('trackLabel').style.color = '#00ff88';

    // 鼻先(1), 左目外(33), 右目外(263), あご(152)
    const nose = lm[1];
    const leftEye = lm[33];
    const rightEye = lm[263];
    const chin = lm[152];

    // 頭部の中心
    const centerX = (leftEye.x + rightEye.x) / 2;
    const centerY = nose.y;

    // 正規化（0.5を中心に -1~1）
    targetX = -(centerX - 0.5) * 2; // 鏡面反転
    targetY = (centerY - 0.45) * 2.5;

    document.getElementById('headX').textContent = targetX.toFixed(3);
    document.getElementById('headY').textContent = targetY.toFixed(3);

    // ---- まばたき検出 ----
    // 左目: 上まぶた(159)下まぶた(145)、右目: 上(386)下(374)
    const leftEyeOpen = Math.abs(lm[159].y - lm[145].y);
    const rightEyeOpen = Math.abs(lm[386].y - lm[374].y);
    const eyeRef = Math.abs(lm[33].x - lm[133].x); // 目の横幅で正規化

    const blinkThreshold = 0.015;
    autoBlinkL = leftEyeOpen < blinkThreshold ? 0.95 : 0;
    autoBlinkR = rightEyeOpen < blinkThreshold ? 0.95 : 0;
    document.getElementById('blinkLStat').textContent = autoBlinkL > 0.5 ? 'CLOSED' : 'open';
    document.getElementById('blinkRStat').textContent = autoBlinkR > 0.5 ? 'CLOSED' : 'open';

    // ---- 口の開き検出 ----
    // 上唇(13), 下唇(14)
    const mouthDist = Math.abs(lm[13].y - lm[14].y);
    const faceHeight = Math.abs(lm[10].y - lm[152].y);
    const mouthRatio = Math.min(1, mouthDist / faceHeight * 6);
    smoothMouth += (mouthRatio - smoothMouth) * 0.2;
    setMouthOpen(smoothMouth);

  } else {
    isTracking = false;
    document.getElementById('faceDetect').textContent = 'SCANNING...';
    document.getElementById('faceDetect').style.color = '#ffaa00';
    document.getElementById('trackLabel').textContent = 'SCANNING';
    document.getElementById('trackLabel').style.color = '#ffaa00';
  }
}

async function toggleCamera() {
  const btn = document.getElementById('camBtn');
  if(!cameraActive) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      const video = document.getElementById('webcam');
      video.srcObject = stream;

      if(!faceMesh) initMediaPipe();

      camera = new Camera(video, {
        onFrame: async () => {
          await faceMesh.send({ image: video });
        },
        width: 640, height: 480
      });
      camera.start();

      cameraActive = true;
      btn.textContent = '■ CAMERA STOP';
      btn.classList.add('stop');
      document.getElementById('camDot').classList.add('active');
      document.getElementById('camLabel').textContent = 'CAMERA ONLINE';
      document.getElementById('camLabel').style.color = '#00ff88';
    } catch(e) {
      alert('カメラへのアクセスが拒否されました。\n' + e.message);
    }
  } else {
    if(camera) camera.stop();
    const video = document.getElementById('webcam');
    if(video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    cameraActive = false;
    isTracking = false;
    btn.textContent = '▶ CAMERA START';
    btn.classList.remove('stop');
    document.getElementById('camDot').classList.remove('active');
    document.getElementById('camLabel').textContent = 'CAMERA OFFLINE';
    document.getElementById('camLabel').style.color = '#555';
    document.getElementById('trackDot').classList.remove('active');
    document.getElementById('trackLabel').textContent = 'TRACKING OFF';
    document.getElementById('trackLabel').style.color = '#555';
    document.getElementById('faceDetect').textContent = '---';
  }
}
</script>
</body>
